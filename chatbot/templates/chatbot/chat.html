<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat UI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f5f7fb; }

.app-container {
    display: flex;
    height: 100vh;
}

/* Sidebar */
.sidebar {
    width: 260px;
    background: #202123;
    color: white;
    padding: 15px;
    overflow-y: auto;
}

.sidebar h5 { color: #ccc; }

.chat-item {
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
}

.chat-item:hover { background: #343541; }

/* Main Chat */
.chat-container {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.chat-box {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
}

.message { margin-bottom: 10px; display: flex; }
.user { justify-content: flex-end; }
.bot { justify-content: flex-start; }

.bubble {
    padding: 10px 15px;
    border-radius: 15px;
    max-width: 70%;
}

.user .bubble { background: #0d6efd; color: white; }
.bot .bubble { background: #e4e6eb; }

.input-area {
    padding: 10px;
    border-top: 1px solid #ddd;
    background: white;
}

.typing { font-style: italic; color: gray; }
</style>
</head>
<body>

<div class="app-container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h5>Chat History</h5>
        <div id="history-list"></div>
    </div>

    <!-- Main Chat -->
    <div class="chat-container">
        <div id="chat-box" class="chat-box"></div>

        <div class="input-area">
            <div class="input-group">
                <input type="text" id="user-input" class="form-control" placeholder="Type a message...">
                <button class="btn btn-primary" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

</div>

<script>
function appendMessage(text, sender) {
    const chatBox = document.getElementById("chat-box");

    const messageDiv = document.createElement("div");
    messageDiv.classList.add("message", sender);

    const bubble = document.createElement("div");
    bubble.classList.add("bubble");
    bubble.innerText = text;

    messageDiv.appendChild(bubble);
    chatBox.appendChild(messageDiv);

    chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping() {
    const chatBox = document.getElementById("chat-box");

    const typingDiv = document.createElement("div");
    typingDiv.classList.add("message", "bot");
    typingDiv.id = "typing";

    const bubble = document.createElement("div");
    bubble.classList.add("bubble", "typing");
    bubble.innerText = "AI is typing...";

    typingDiv.appendChild(bubble);
    chatBox.appendChild(typingDiv);

    chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
    const typing = document.getElementById("typing");
    if (typing) typing.remove();
}

function sendMessage() {
    const input = document.getElementById("user-input");
    const message = input.value.trim();

    if (!message) return;

    appendMessage(message, "user");
    input.value = "";

    showTyping();

    fetch("/chat/", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCookie("csrftoken")
        },
        body: JSON.stringify({ message: message })
    })
    .then(res => res.json())
    .then(data => {
        removeTyping();
        appendMessage(data.response || "No response", "bot");
        loadHistory(); // refresh sidebar
    })
    .catch(() => {
        removeTyping();
        appendMessage("Server error.", "bot");
    });
}

// Load chat history on page load
function loadHistory() {
    fetch("/history/")
    .then(res => res.json())
    .then(data => {
        const historyList = document.getElementById("history-list");
        historyList.innerHTML = "";

        data.history.forEach(chat => {
            const item = document.createElement("div");
            item.classList.add("chat-item");
            item.innerText = chat.user_message;

            item.onclick = () => {
                document.getElementById("chat-box").innerHTML = "";
                appendMessage(chat.user_message, "user");
                appendMessage(chat.bot_response, "bot");
            };

            historyList.appendChild(item);
        });
    });
}

// CSRF helper
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== "") {
        const cookies = document.cookie.split(";");
        for (let cookie of cookies) {
            cookie = cookie.trim();
            if (cookie.startsWith(name + "=")) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

// Enter key

document.getElementById("user-input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
});

// Load history when page opens
window.onload = loadHistory;
</script>

</body>
</html>
