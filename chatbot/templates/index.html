<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SafeChoice AI Chatbot</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f5f7fa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

/* Chat Container */

.chat-container{
width:360px;
height:600px;
background:white;
border-radius:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
overflow:hidden;
}

/* Header */

.chat-header{
background:#2A7DE1;
color:white;
padding:15px;
font-weight:bold;
text-align:center;
}

/* Chat Area */

.chat-box{
flex:1;
padding:10px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

/* Messages */

.bot-message{
background:#e6f0ff;
padding:10px;
border-radius:10px;
max-width:75%;
}

.user-message{
background:#2A7DE1;
color:white;
padding:10px;
border-radius:10px;
align-self:flex-end;
max-width:75%;
}

/* Suggested Questions */

.quick-questions{
padding:10px;
display:flex;
flex-wrap:wrap;
gap:5px;
}

.quick-questions button{
background:#f0f0f0;
border:none;
padding:6px 10px;
border-radius:8px;
cursor:pointer;
font-size:12px;
}

/* Input Area */

.input-area{
display:flex;
border-top:1px solid #ddd;
}

.input-area input{
flex:1;
padding:10px;
border:none;
outline:none;
}

.input-area button{
background:#2A7DE1;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="chat-container">

<div class="chat-header">
SafeChoice AI Assistant
</div>

<div class="chat-box" id="chatBox">

<div class="bot-message">
Hello 👋 I can help you learn about contraceptive options, side effects, and clinics.
</div>

</div>

<div class="quick-questions">

<button onclick="quickMessage('Best contraceptive method')">
Best method
</button>

<button onclick="quickMessage('Side effects of implants')">
Implant side effects
</button>

<button onclick="quickMessage('Natural family planning')">
Natural planning
</button>

<button onclick="quickMessage('Where can I get contraceptives')">
Find clinic
</button>

</div>

<div class="input-area">

<input type="text" id="userInput" placeholder="Ask your question...">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

function addUserMessage(message){

let chatBox = document.getElementById("chatBox")

let div = document.createElement("div")
div.className = "user-message"
div.innerText = message

chatBox.appendChild(div)

chatBox.scrollTop = chatBox.scrollHeight
}

function addBotMessage(message){

let chatBox = document.getElementById("chatBox")

let div = document.createElement("div")
div.className = "bot-message"
div.innerText = message

chatBox.appendChild(div)

chatBox.scrollTop = chatBox.scrollHeight
}
function showTyping(){

let chatBox = document.getElementById("chatBox")

let typing = document.createElement("div")

typing.className = "bot-message"

typing.id = "typing"

typing.innerText = "Bot is typing..."

chatBox.appendChild(typing)

chatBox.scrollTop = chatBox.scrollHeight
}

function removeTyping(){

let typing = document.getElementById("typing")

if(typing){
typing.remove()
}

}

function sendMessage() {
    const message = document.getElementById("messageInput").value;

    navigator.geolocation.getCurrentPosition(function(position) {

        const lat = position.coords.latitude;
        const lon = position.coords.longitude;

        fetch("/chatbot/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message,
                latitude: lat,
                longitude: lon
            })
        })
        .then(res => res.json())
        .then(data => {
            console.log(data.response);
        });

    }, function(error) {
        console.log("GPS error:", error);

        // fallback if user denies location
        fetch("/chatbot/", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message
            })
        });
    });
}

function quickMessage(text){

document.getElementById("userInput").value = text

sendMessage()

}

</script>

</body>
</html>
