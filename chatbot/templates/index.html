<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SafeChoice AI Chatbot</title>

<style>

body{
margin:0;
font-family: Arial, sans-serif;
display:flex;
height:100vh;
background:#f5f7fa;
}

/* SIDEBAR */
.sidebar{
width:250px;
background:#1e293b;
color:white;
display:flex;
flex-direction:column;
padding:10px;
}

.sidebar h2{
font-size:16px;
margin-bottom:10px;
}

.new-chat{
background:#2A7DE1;
border:none;
padding:10px;
color:white;
border-radius:8px;
cursor:pointer;
margin-bottom:15px;
}

.chat-list{
flex:1;
overflow-y:auto;
}

.chat-item{
padding:8px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

.chat-item:hover{
background:#334155;
}

/* MAIN CHAT */
.chat-container{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */
.chat-header{
background:#2A7DE1;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
}

/* CHAT BOX */
.chat-box{
flex:1;
padding:15px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.bot-message{
background:#e6f0ff;
padding:10px;
border-radius:10px;
max-width:70%;
}

.user-message{
background:#2A7DE1;
color:white;
padding:10px;
border-radius:10px;
align-self:flex-end;
max-width:70%;
}

/* FAQ */
.faq{
padding:10px;
border-top:1px solid #ddd;
}

.faq select{
width:100%;
padding:8px;
border-radius:6px;
}

/* INPUT */
.input-area{
display:flex;
border-top:1px solid #ddd;
}

.input-area input{
flex:1;
padding:10px;
border:none;
outline:none;
}

.input-area button{
background:#2A7DE1;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<button class="new-chat" onclick="newChat()">+ New Chat</button>

<h2>Recent Chats</h2>

<div class="chat-list">
<div class="chat-item">Contraceptive methods</div>
<div class="chat-item">Side effects</div>
</div>

</div>

<!-- CHAT AREA -->
<div class="chat-container">

<div class="chat-header">
SafeChoice AI Assistant
</div>

<div class="chat-box" id="chatBox">

<div class="bot-message">
Hello 👋 I can help with contraceptives, side effects, and clinics.
</div>

</div>

<!-- FAQ -->
<div class="faq">
<select onchange="quickMessage(this.value)">
<option value="">💡 Frequently Asked Questions</option>
<option value="What are the different contraceptive methods?">Methods</option>
<option value="What are side effects of contraceptives?">Side effects</option>
<option value="Which contraceptive is best for me?">Best method</option>
<option value="Where can I get contraceptives near me?">Find clinic</option>
</select>
</div>

<!-- INPUT -->
<div class="input-area">
<input type="text" id="userInput" placeholder="Ask your question...">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script>

/* =========================
   CSRF COOKIE FUNCTION
========================= */
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

/* =========================
   CHAT FUNCTIONS
========================= */

function newChat(){
document.getElementById("chatBox").innerHTML = `
<div class="bot-message">
New chat started 👋 Ask me anything about contraceptives.
</div>
`;
}

function addUserMessage(message){
let chatBox = document.getElementById("chatBox");

let div = document.createElement("div");
div.className = "user-message";
div.innerText = message;

chatBox.appendChild(div);
chatBox.scrollTop = chatBox.scrollHeight;
}

function addBotMessage(message){
let chatBox = document.getElementById("chatBox");

let div = document.createElement("div");
div.className = "bot-message";
div.innerText = message;

chatBox.appendChild(div);
chatBox.scrollTop = chatBox.scrollHeight;
}

/* =========================
   SEND MESSAGE (WITH CSRF)
========================= */

function sendMessage(){

let input = document.getElementById("userInput");
let message = input.value.trim();

if(!message) return;

addUserMessage(message);
input.value = "";

// GET LOCATION
navigator.geolocation.getCurrentPosition(function(position){

fetch("/chatbot/", {
method: "POST",
headers: {
    "Content-Type": "application/json",
    "X-CSRFToken": getCookie("csrftoken")
},
body: JSON.stringify({
    message: message,
    latitude: position.coords.latitude,
    longitude: position.coords.longitude
})
})
.then(res => res.json())
.then(data => addBotMessage(data.response));

}, function(){

// fallback without location
fetch("/chatbot/", {
method: "POST",
headers: {
    "Content-Type": "application/json",
    "X-CSRFToken": getCookie("csrftoken")
},
body: JSON.stringify({ message: message })
})
.then(res => res.json())
.then(data => addBotMessage(data.response));

});

}

/* =========================
   FAQ QUICK ACTION
========================= */

function quickMessage(text){
if(!text) return;
document.getElementById("userInput").value = text;
sendMessage();
}

</script>

</body>
</html>
